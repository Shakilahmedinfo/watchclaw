# test.conf — Test configuration for your OpenClaw gateway

GATEWAY_PORT=18851
GATEWAY_CONFIG_DIR="$HOME/.openclaw-sheep"
GATEWAY_LOG="/tmp/sheep-gateway.log"

# OpenClaw binary (auto-detected if on PATH)
# OPENCLAW_BIN="/opt/homebrew/bin/openclaw"
OPENCLAW_ARGS="--profile sheep"

POLL_INTERVAL_SEC=5           # faster polling for tests
HEALTH_TIMEOUT_SEC=3
GRACE_PERIOD_SEC=15           # shorter grace
PROBATION_DURATION_SEC=20     # 20s probation (instead of 5min)

MAX_RETRIES=3
BACKOFF_INITIAL_SEC=30
BACKOFF_MAX_SEC=120

ALERT_HOOK="none"         # muted for tests
LOG_FILE="/tmp/watchclaw-sheep.log"
LOG_MAX_BYTES=1048576
DRY_RUN=1                 # alerts are dry-run
