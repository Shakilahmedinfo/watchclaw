# oc-watchdog.conf — Gateway Watchdog Configuration
# All values can be overridden via environment variables

# OpenClaw profile name (used for --profile flag)
OC_PROFILE="sheep"

# Gateway port
GATEWAY_PORT=18851

# Config directory (where openclaw.json lives, must be a git repo)
CONFIG_DIR="$HOME/.openclaw-sheep"

# Health check
HEALTH_URL="http://127.0.0.1:${GATEWAY_PORT}/health"
POLL_INTERVAL=10          # seconds between health checks
HEALTH_TIMEOUT=5          # curl timeout for health check

# Probation: how long gateway must stay healthy after config change
# before we promote the commit to "last known good"
PROBATION_DURATION=300    # 5 minutes

# Crash loop detection (for non-config crashes)
CRASH_THRESHOLD=3         # crashes within window = crash loop
CRASH_WINDOW=120          # seconds

# Grace period after any restart (don't judge health during this)
GRACE_PERIOD=30           # seconds

# How to start the gateway (direct process, not launchd)
GATEWAY_START_CMD="OPENCLAW_STATE_DIR=${CONFIG_DIR} OPENCLAW_CONFIG_PATH=${CONFIG_DIR}/openclaw.json node /opt/homebrew/lib/node_modules/openclaw/dist/index.js gateway --port ${GATEWAY_PORT}"

# Log file
LOG_FILE="$HOME/workspace/oc-watchdog/logs/watchdog.log"

# State files (written inside CONFIG_DIR alongside the git repo)
LAST_GOOD_FILE="${CONFIG_DIR}/.last_good_hash"
PROBATION_FILE="${CONFIG_DIR}/.watchdog_probation"

# iMessage fallback alert (set to empty to disable)
ALERT_PHONE=""  # populated from secrets.env at runtime

# Patterns in gateway logs that indicate config errors
CONFIG_ERROR_PATTERNS="Invalid config|SyntaxError|JSON|parse error|schema|ENOENT|TypeError|Cannot read|validation|Unrecognized key"

# Gateway log file (OpenClaw default)
GATEWAY_LOG="/tmp/sheep-gateway.log"

# Dry-run mode (1 = echo alerts instead of sending, 0 = real)
DRY_RUN=1
